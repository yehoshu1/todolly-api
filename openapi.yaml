openapi: 3.0.0
info:
  title: Todolly API
  description: A comprehensive task management API with JWT authentication, featuring tasks, subtasks, and reminders with user isolation.
  version: 1.0.0
  contact:
    name: Todolly API Support
    url: https://github.com/yehoshu1/notelly
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: http://localhost:3001
    description: Alternative development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique user identifier
          example: BIyS-F5XCxn0qV_tYYGa1
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        name:
          type: string
          description: User's full name
          example: John Doe
      required: [id, email, name]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        name:
          type: string
          minLength: 1
          description: User's full name
          example: John Doe
        password:
          type: string
          minLength: 6
          description: User's password (minimum 6 characters)
          example: password123
      required: [email, name, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: user@example.com
        password:
          type: string
          minLength: 1
          description: User's password
          example: password123
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Authentication success status
        message:
          type: string
          description: Response message
        token:
          type: string
          description: JWT token (only provided on successful authentication)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'
      required: [success, message]

    ProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Operation success status
          example: true
        user:
          $ref: '#/components/schemas/User'
      required: [success, user]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Operation success status
          example: false
        message:
          type: string
          description: Error message
          example: Invalid credentials
      required: [success, message]

    Task:
      type: object
      properties:
        taskId:
          type: string
          description: Unique task identifier
          example: 6I52m6z2pIAgWdCQjADLS
        userId:
          type: string
          description: ID of the user who owns this task
          example: BIyS-F5XCxn0qV_tYYGa1
        title:
          type: string
          description: Task title
          example: Complete project documentation
        description:
          type: string
          nullable: true
          description: Task description
          example: Write comprehensive README and API docs
        dueDate:
          type: string
          format: date
          nullable: true
          description: Due date in ISO format (YYYY-MM-DD)
          example: '2025-08-30'
        dueTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$'
          nullable: true
          description: Due time in HH:MM:SS format
          example: '17:00:00'
        location:
          type: string
          nullable: true
          description: Task location
          example: Office Conference Room
        status:
          type: boolean
          description: Task completion status
          example: false
        priority:
          type: string
          nullable: true
          description: Task priority level
          enum: [low, medium, high, urgent]
          example: high
        createdAt:
          type: string
          format: date-time
          description: Task creation timestamp
          example: '2025-08-26 14:36:22'
        updatedAt:
          type: string
          format: date-time
          description: Task last update timestamp
          example: '2025-08-26 14:36:22'
      required: [taskId, userId, title, status, createdAt, updatedAt]

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
          description: Task title
          example: Complete project documentation
        description:
          type: string
          description: Task description
          example: Write comprehensive README and API docs
        dueDate:
          type: string
          format: date
          description: Due date in ISO format (YYYY-MM-DD)
          example: '2025-08-30'
        dueTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$'
          description: Due time in HH:MM:SS format
          example: '17:00:00'
        location:
          type: string
          description: Task location
          example: Office Conference Room
        status:
          type: boolean
          description: Task completion status
          example: false
        priority:
          type: string
          description: Task priority level
          enum: [low, medium, high, urgent]
          example: high
      required: [title, status]

    Subtask:
      type: object
      properties:
        subtaskId:
          type: string
          description: Unique subtask identifier
          example: sub_xyz123
        taskId:
          type: string
          description: ID of the parent task
          example: 6I52m6z2pIAgWdCQjADLS
        title:
          type: string
          description: Subtask title
          example: Write installation instructions
        description:
          type: string
          nullable: true
          description: Subtask description
          example: Detail the setup process
        status:
          type: boolean
          description: Subtask completion status
          example: false
        priority:
          type: string
          nullable: true
          description: Subtask priority level
          enum: [low, medium, high, urgent]
          example: medium
        createdAt:
          type: string
          format: date-time
          description: Subtask creation timestamp
          example: '2025-08-26 14:36:22'
        updatedAt:
          type: string
          format: date-time
          description: Subtask last update timestamp
          example: '2025-08-26 14:36:22'
      required: [subtaskId, taskId, title, status, createdAt, updatedAt]

    CreateSubtaskRequest:
      type: object
      properties:
        taskId:
          type: string
          description: ID of the parent task
          example: 6I52m6z2pIAgWdCQjADLS
        title:
          type: string
          description: Subtask title
          example: Write installation instructions
        description:
          type: string
          description: Subtask description
          example: Detail the setup process
        status:
          type: boolean
          description: Subtask completion status
          example: false
        priority:
          type: string
          description: Subtask priority level
          enum: [low, medium, high, urgent]
          example: medium
      required: [taskId, title, status]

    Reminder:
      type: object
      properties:
        reminderId:
          type: string
          description: Unique reminder identifier
          example: rem_abc789
        taskId:
          type: string
          description: ID of the associated task
          example: 6I52m6z2pIAgWdCQjADLS
        remindAt:
          type: string
          format: date-time
          description: When to trigger the reminder (ISO 8601 format)
          example: '2025-08-30T16:00:00.000Z'
        message:
          type: string
          nullable: true
          description: Custom reminder message
          example: Don't forget to submit the documentation
      required: [reminderId, taskId, remindAt]

    CreateReminderRequest:
      type: object
      properties:
        taskId:
          type: string
          description: ID of the associated task
          example: 6I52m6z2pIAgWdCQjADLS
        remindAt:
          type: string
          format: date-time
          description: When to trigger the reminder (ISO 8601 format)
          example: '2025-08-30T16:00:00.000Z'
        message:
          type: string
          description: Custom reminder message
          example: Don't forget to submit the documentation
      required: [taskId, remindAt]

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Create a new user account with email and password. Returns a JWT token for immediate authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Registration failed - validation error or user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticate user with email and password. Returns a JWT token for accessing protected endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:
    get:
      tags: [Authentication]
      summary: Get current user profile
      description: Retrieve the profile information of the currently authenticated user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout user
      description: 'Logout the current user. Note: For JWT, this is mainly informational - the client should discard the token.'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout successful. Please discard your token on the client side.
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks:
    get:
      tags: [Tasks]
      summary: Get user's tasks
      description: Retrieve all tasks belonging to the authenticated user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Tasks]
      summary: Create a new task
      description: Create a new task for the authenticated user.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a specific task
      description: Retrieve a specific task by ID (user can only access their own tasks).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            example: 6I52m6z2pIAgWdCQjADLS
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Tasks]
      summary: Update a task
      description: Update a specific task by ID (user can only update their own tasks).
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            example: 6I52m6z2pIAgWdCQjADLS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Tasks]
      summary: Delete a task
      description: Delete a specific task by ID (user can only delete their own tasks). This will also delete all associated subtasks and reminders.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            example: 6I52m6z2pIAgWdCQjADLS
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Task deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Similar patterns for /subtasks and /reminders endpoints...
  # (Truncated for brevity - the full YAML would include all endpoints)

tags:
  - name: Authentication
    description: User authentication and profile management endpoints
  - name: Tasks
    description: Task management endpoints - all require authentication
  - name: Subtasks
    description: Subtask management endpoints - all require authentication
  - name: Reminders
    description: Reminder management endpoints - all require authentication

security:
  - BearerAuth: []
